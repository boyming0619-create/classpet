<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>萌宠乐园</title>
    <link rel="stylesheet" href="assets/css/style.css?v=5">
    <script>console.log('ClassPet Pro v1.0.5 - 2026-03-12');</script>
</head>
<body>
    <div id="app">
        <!-- 顶部标题栏（新增排行榜按钮） -->
        <header class="header">
            <h1 class="class-name">❤️ 二年级（1）班 ❤️</h1>
            <div class="header-actions">
                <button class="btn-style" id="btnSelectStyle" onclick="showPetStyleSelection()">🎨 选择风格</button>
                <button class="btn-teacher" id="btnTeacher">👨‍🏫 教师模式</button>
                <!-- 新增排行榜按钮，风格与其他按钮一致 -->
                <button class="btn-ranking" id="btnRanking" style="margin-left: 8px;">🏆 排行榜</button>
            </div>
        </header>

        <!-- 萌宠展示区 -->
        <main class="pet-grid" id="petGrid">
            <!-- 动态生成40个萌宠卡片 -->
        </main>

        <!-- 学生详情弹窗 -->
        <div class="modal" id="studentModal">
            <div class="modal-content">
                <span class="close-btn" id="closeModal">&times;</span>
                <div class="student-detail">
                    <div class="pet-display">
                        <img id="detailPetImage" src="" alt="萌宠">
                        <div class="evolution-effect" id="evolutionEffect"></div>
                    </div>
                    <h2 id="detailName">学生姓名</h2>
                    <div class="score-section">
                        <div class="current-score">
                            <span class="score-label">当前积分</span>
                            <span class="score-value" id="detailScore">0</span>
                        </div>
                        <div class="score-controls">
                            <button class="btn-score btn-minus" data-value="-5">-5</button>
                            <button class="btn-score btn-minus" data-value="-1">-1</button>
                            <button class="btn-score btn-plus" data-value="+1">+1</button>
                            <button class="btn-score btn-plus" data-value="+5">+5</button>
                            <button class="btn-score btn-plus" data-value="+10">+10</button>
                        </div>
                    </div>
                    <div class="progress-section">
                        <div class="stage-info">
                            <span id="currentStage">蛋</span>
                            <span class="arrow">→</span>
                            <span id="nextStage">幼崽</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-text">
                            还需 <span id="needScore">50</span> 分升级
                        </div>
                    </div>
                    <div class="rewards-section">
                        <h3>🏆 已获得奖励</h3>
                        <div class="rewards-list" id="rewardsList">
                            <span class="no-rewards">暂无奖励</span>
                        </div>
                    </div>
                    <button class="btn-redeem" id="btnRedeem">🎁 兑换奖励</button>
                </div>
            </div>
        </div>

        <!-- 新增：排行榜弹窗 -->
        <div class="modal" id="rankingModal">
            <div class="modal-content modal-large">
                <h2>🏆 积分排行榜 Top10</h2>
                <!-- 排行榜列表 -->
                <div class="ranking-list" id="rankingList" style="margin: 20px 0; max-height: 60vh; overflow-y: auto;">
                    <!-- 动态生成排行榜项（示例占位） -->
                    <div class="ranking-item" style="display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #eee; align-items: center;">
                        <div style="display: flex; align-items: center;">
                            <span class="rank-num" style="width: 30px; height: 30px; line-height: 30px; text-align: center; background: #ffd700; color: #fff; border-radius: 50%; margin-right: 12px; font-weight: bold;">1</span>
                            <span class="rank-name" style="font-size: 16px; font-weight: 500;">张三</span>
                        </div>
                        <span class="rank-score" style="font-size: 16px; color: #e63946; font-weight: bold;">980 分</span>
                    </div>
                    <div class="ranking-item" style="display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #eee; align-items: center;">
                        <div style="display: flex; align-items: center;">
                            <span class="rank-num" style="width: 30px; height: 30px; line-height: 30px; text-align: center; background: #c0c0c0; color: #fff; border-radius: 50%; margin-right: 12px; font-weight: bold;">2</span>
                            <span class="rank-name" style="font-size: 16px; font-weight: 500;">李四</span>
                        </div>
                        <span class="rank-score" style="font-size: 16px; color: #e63946; font-weight: bold;">920 分</span>
                    </div>
                    <div class="ranking-item" style="display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #eee; align-items: center;">
                        <div style="display: flex; align-items: center;">
                            <span class="rank-num" style="width: 30px; height: 30px; line-height: 30px; text-align: center; background: #cd7f32; color: #fff; border-radius: 50%; margin-right: 12px; font-weight: bold;">3</span>
                            <span class="rank-name" style="font-size: 16px; font-weight: 500;">王五</span>
                        </div>
                        <span class="rank-score" style="font-size: 16px; color: #e63946; font-weight: bold;">880 分</span>
                    </div>
                    <!-- 可继续添加4-10名占位，或由JS动态生成 -->
                </div>
                <!-- 返回主页按钮（风格与其他按钮一致） -->
                <button class="btn-back-home" id="btnBackHome" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; margin-top: 16px;">
                    🏠 返回主页
                </button>
            </div>
        </div>

        <!-- 教师模式弹窗 -->
        <div class="modal" id="teacherModal">
            <div class="modal-content modal-small">
                <h2>🔐 教师模式</h2>
                <p style="text-align: center; margin: 20px 0; color: #666;">点击下方按钮进入管理页面</p>
                <div style="text-align: center; padding: 20px;">
                    <button onclick="document.getElementById('teacherModal').classList.remove('active'); window.location.href='admin.html';" style="padding: 15px 40px; font-size: 18px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);">进入管理页面</button>
                </div>
            </div>
        </div>

        <!-- 教师管理面板 -->
        <div class="modal" id="adminModal">
            <div class="modal-content modal-large">
                <span class="close-btn" id="closeAdmin">&times;</span>
                <h2>⚙️ 班级管理</h2>
                <div class="admin-tabs">
                    <button class="tab-btn active" data-tab="students">👥 学生管理</button>
                    <button class="tab-btn" data-tab="settings">🔧 进化设置</button>
                    <button class="tab-btn" data-tab="rewards">🎁 奖励设置</button>
                    <button class="tab-btn" data-tab="data">💾 数据管理</button>
                </div>
                <div class="tab-content" id="tabContent">
                    <!-- 动态内容 -->
                </div>
            </div>
        </div>

        <!-- 兑换奖励弹窗 -->
        <div class="modal" id="redeemModal">
            <div class="modal-content">
                <span class="close-btn" id="closeRedeem">&times;</span>
                <h2>🎁 兑换奖励</h2>
                <div class="redeem-list" id="redeemList">
                    <!-- 动态生成奖励列表 -->
                </div>
            </div>
        </div>

        <!-- 进化庆祝弹窗 -->
        <div class="modal celebration" id="celebrationModal">
            <div class="celebration-content">
                <div class="celebration-pet" id="celebrationPet"></div>
                <h1 class="celebration-title">🎉 恭喜进化！</h1>
                <p class="celebration-text" id="celebrationText"></p>
                <button class="btn-celebrate" id="btnCelebrate">太棒了！</button>
            </div>
        </div>
    </div>

    <!-- 萌宠风格选择弹窗 -->
    <div class="modal" id="petSelectModal">
        <div class="modal-content">
            <h2>🎨 选择你的萌宠风格</h2>
            <div class="pet-style-grid" id="petStyleGrid">
                <div class="pet-style-option" data-style="cute">
                    <div class="style-preview">🐱</div>
                    <div class="style-name">萌宠风</div>
                </div>
                <div class="pet-style-option" data-style="fantasy">
                    <div class="style-preview">🐉</div>
                    <div class="style-name">幻想风</div>
                </div>
                <div class="pet-style-option" data-style="pixel">
                    <div class="style-preview">🐤</div>
                    <div class="style-name">像素风</div>
                </div>
                <div class="pet-style-option" data-style="scifi">
                    <div class="style-preview">🤖</div>
                    <div class="style-name">科幻风</div>
                </div>
                <div class="pet-style-option" data-style="china">
                    <div class="style-preview">🐼</div>
                    <div class="style-name">国潮风</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/pets.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/feishu-sync.js"></script>
    <script src="js/app.js"></script>
    <!-- 新增：排行榜弹窗控制脚本 -->
    <script>
        // 显示排行榜弹窗
        document.getElementById('btnRanking').addEventListener('click', function() {
            document.getElementById('rankingModal').classList.add('active');
        });
        // 返回主页（隐藏排行榜弹窗）
        document.getElementById('btnBackHome').addEventListener('click', function() {
            document.getElementById('rankingModal').classList.remove('active');
        });
        // 可选：点击弹窗外部关闭（如果原有modal有此逻辑，可复用）
        window.addEventListener('click', function(e) {
            const rankingModal = document.getElementById('rankingModal');
            if (e.target === rankingModal) {
                rankingModal.classList.remove('active');
            }
        });
    </script>
</body>
</html>
